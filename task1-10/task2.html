    <script>
        // 2 .To find the maximum of two numbers using ternary operator

          num1 = Number(prompt("Enter first number"));
          num2 = Number(prompt("Enter second number"));

          result = num1 > num2 ? num1 + ' is greater': num1<num2 ? num2 + ' is greater' : 'Both are equal';

          console.log(result);

    </script>
