<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 5.  determining if a number is divisible by 5 and 11 using logical operators.

      num = Number(prompt("Enter a number"));

      if(num%5==0 && num%11==0){
          console.log(num + ' is divisible by both 5 and 11');
      }
      else if(num%5==0){
          console.log(num + ' is divisible by 5 but not divisible by 11');
      }
      else if(num%11==0){
          console.log(num + ' is divisible by 11 but not divisible by 5');
      }
      else{
          console.log(num + ' is not divisible by both 5 and 11');
      }

    </script>
</body>
</html>
