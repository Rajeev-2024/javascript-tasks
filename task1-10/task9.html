<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //   9.Check if a year is a leap year or not using nested if

      year = Number(prompt("Enter any year"));

      if (year % 4 === 0)
       {
        if (year % 100 === 0) 
        {
          if (year % 400 === 0) 
          {
            console.log(year + " is a leap year");
          } 
          else 
          {
            console.log(year + " is not a leap year");
          }
        }
         else 
         {
          console.log(year + " is a leap year");
        }
      }
       else 
       {
        console.log(year + " is not a leap year");
      }

    </script>
  </body>
</html>
