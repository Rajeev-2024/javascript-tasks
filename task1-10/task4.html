    <script>
        // 4. Checking whether the two numbers are equal or not using == and  !=.

      num1 = Number(prompt("Enter first number"));
      num2 = Number(prompt("Enter second number"));

      result = num1 == num2 ? num1 + ' and ' + num2 + ' are Equal': num1 + ' and  ' + num2 + ' are not Equal'

      console.log(result);

    </script>
