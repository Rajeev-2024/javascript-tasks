<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <script>
      //    8. Use the assignment operators (+=, -=, *=, /=) to update a variable and print results.

      num = 10;

      num += 5;
      console.log(num);

      num -= 3;
      console.log(num);

      num *= 2;
      console.log(num);

      num /= 4;
      console.log(num);
      
    </script>
  </body>
</html>
