  <body>
    <script>
      // 27.Write a program to check if a number is multiple of 4 but not of 8.

      num = Number(prompt("Enter a number"));

      if (num % 4 == 0 && num % 8 != 0) {
          console.log("Multiple of 4 but not 8");
      }
      else {
          console.log("Condition not satisfied");
      }

    </script>
  </body>
</html>
