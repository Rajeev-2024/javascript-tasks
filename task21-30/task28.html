<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 28.Use nested if–else to determine if a number is divisible by both 2 and 5, only 2, only 5, or neither.

      num = Number(prompt("Enter a number"));

      if (num % 2 == 0 && num % 5 == 0) {
          console.log("Divisible by both 2 and 5");
      }
      else if (num % 2 == 0) {
          console.log("Divisible only by 2");
      }
      else if (num % 5 == 0) {
          console.log("Divisible only by 5");
      }
      else {
          console.log("Divisible by neither");
      }

    </script>
  </body>
</html>
