    <title>Document</title>

  <body>
    <script>
      // 26.Use ! (NOT operator) to invert a boolean condition and explain the output.

      isLoggedIn = false;

      if (!isLoggedIn) {
        console.log("User is not logged in");
      } else {
        console.log("User is logged in");
      }
      
    </script>
  </body>
