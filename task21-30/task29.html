  <body>
    <script>
      // 29.Write a program to check if a number is within 1–100, 101–500, or above 500 using else-if ladder.

      num = Number(prompt("Enter a number"));

      if (num >= 1 && num <= 100) {
          console.log("Between 1 and 100");
      }
      else if (num >= 101 && num <= 500) {
          console.log("Between 101 and 500");
      }
      else {
          console.log("Above 500");
      }

    </script>
  </body>
</html>
