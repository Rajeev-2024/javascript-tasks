<body>
    <script>
        // 21.Write a program to check if three sides can form a triangle using relational operators.

      a = Number(prompt("Enter first side"));
      b = Number(prompt("Enter second side"));
      c = Number(prompt("Enter third side"));

      if (a + b > c && a + c > b && b + c > a) {
          console.log("Triangle can be formed");
      }
      else {
          console.log("Triangle cannot be formed");
      }

    </script>
</body>
