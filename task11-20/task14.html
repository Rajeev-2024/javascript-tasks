<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         // 14.Check if a number is within range 100–200 or outside using && and ||.

      num = Number(prompt("Enter a number"));

        if(num>100  && num<200){
          console.log(num + ' lies between 10 and 50');
        }
        else{
          console.log(num + "  doesn't lies between 10 and 50");
        }

        if(num<=100  || num>=200){
          console.log(num + "  doesn't lies between 10 and 50");
        }
        else{
          console.log(num + ' lies between 10 and 50' );
        }

    </script>
</body>
</html>
