<body>
    <script>
         // 17.Use the ternary operator to assign grades based on marks.

        marks = Number(prompt("Enter marks between 1 to 100"));

        result = marks>=80 ? "grade-A": marks>=70 ? "grade-B" : marks>=50 ? "grade-C" : marks>=35 ? "grade-D" : "Fail" ;
      
      console.log(result);

    </script>
</body>
