<body>
    <script>
        // 16. Write a program to determine if a number is positive and even, positive and odd, or negative.

      num = Number(prompt("Enter any number"));
          if (num >= 0 && num%2==0) {
            console.log("Positive and Even");
          }
          else if(num >= 0 && num%2!=0){
            console.log("Positive and Odd");
          }
          else{
            console.log("Negative");
          }

    </script>
</body>
