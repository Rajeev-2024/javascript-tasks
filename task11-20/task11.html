<body>
    <script>
        // 11.Write a program to find the largest of three numbers using if–else ladder.

        num1 = Number(prompt("Enter first number"));
        num2 = Number(prompt("Enter second number"));
        num3 = Number(prompt("Enter third number"));

        if (num1 > num2 && num1 > num3) {
          console.log(num1 + " is the largest number");
        } else if (num2 > num1 && num2 > num3) {
          console.log(num2 + " is the largest number");
        } else if (num3 > num1 && num3 > num2) {
          console.log(num3 + " is the largest number");
        } else if (num1 === num2 && num1 > num3) {
          console.log(num1 + " and " + num2 + " are the largest numbers");
        } else if (num1 === num3 && num1 > num2) {
          console.log(num1 + " and " + num3 + " are the largest numbers");
        } else if (num2 === num3 && num2 > num1) {
          console.log(num2 + " and " + num3 + " are the largest numbers");
        } else {
          console.log("All three numbers are equal");
        }

    </script>
</body>
</html>
