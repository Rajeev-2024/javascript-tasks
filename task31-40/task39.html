<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 39.Write a program using if–else ladder to determine salary hike percentage based on performance rating (1–5).

      rating = Number(prompt("Enter rating"));

      if (rating == 5) {
          console.log("Salary Hike: 25%");
      }
      else if (rating == 4) {
          console.log("Salary Hike: 20%");
      }
      else if (rating == 3) {
          console.log("Salary Hike: 15%");
      }
      else if (rating == 2) {
          console.log("Salary Hike: 10%");
      }
      else if (rating == 1) {
          console.log("Salary Hike: 5%");
      }
      else {
          console.log("Invalid Rating");
      }

    </script>
</body>
</html>
