<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 33.Create a program that checks if a number is divisible by 2, 3, and 5 simultaneously, and prints a custom message.

      num = Number(prompt("Enter a number"));

      if (num % 2 == 0 && num % 3 == 0 && num % 5 == 0) {
          console.log("Number is divisible by 2, 3 and 5");
      }
      else {
          console.log("Number is not divisible by 2, 3 and 5");
      }

    </script>
</body>
</html>
