  <body>
    <script>
      // 32.Use nested if–else to determine if a number is a perfect square or not.

      num = Number(prompt("Enter a number"));

      if (num == 1 || num == 4 || num == 9 || num == 16 || num == 25 ||
          num == 36 || num == 49 || num == 64 || num == 81 || num == 100) {

          console.log("Perfect Square");
      }
      else {
          console.log("Not a Perfect Square");
      }

    </script>
  </body>
