<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 38.Use logical operators to verify if (a > b && b > c) or (a < b && b < c) and print “ascending” or “descending”.

      a = Number(prompt("Enter first number"));
      b = Number(prompt("Enter second number"));
      c = Number(prompt("Enter third number"));

      if (a > b && b > c) {
          console.log("Descending");
      }
      else if (a < b && b < c) {
          console.log("Ascending");
      }
      else {
          console.log("Neither Ascending nor Descending");
      }

    </script>
</body>
</html>
